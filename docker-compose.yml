name: Timed Wordle
services:
  app-react:
    build:
      context: ./reactapp
      dockerfile: Dockerfile
    container_name: app-react
    ports:
     - 5173:5173
    restart: unless-stopped
    image: app-react
  api-django:
    build:
      context: ./djangoapp
      dockerfile: Dockerfile
    container_name: api-django
    ports:
      - 8000:8000
    restart: unless-stopped
    env_file: "./djangoapp/wordlebackend/.env"
    image: api-django